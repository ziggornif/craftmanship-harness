notes: >
  MIT. handoff: references artifacts by path/URL rather than duplicating; redacts
  secrets; includes a 'suggested skills' section — point that at this harness's skill
  set when adapting. prototype: two branches (LOGIC = terminal app for state/logic,
  UI = several variants on one route); its 'capture the answer in an ADR/notes then
  delete' step aligns with local/ubiquitous-language ADR discipline, and its UI branch
  feeds a future designer role.
  codebase-design: deep-module vocabulary (module/interface/depth/seam/adapter/leverage/
  locality), the deletion test, testability-through-the-interface. Complements
  local/hexagonal-architecture (which owns API/SPI + slicing) rather than colliding.
  TERMINOLOGY OVERLAP to keep coherent: it reuses 'seam' and 'adapter' — align these with
  the local/ubiquitous-language glossary so the harness speaks one vocabulary. Vendored
  pristine (no code patch); this note records the alignment, it is not a local_patch.
  improve-codebase-architecture: sweeps the codebase for shallow modules and emits an
  HTML audit report of deepening candidates — an inferential architecture sensor that
  serves the orchestrator's flagged architecture-regulation gap. Depends on
  codebase-design vocabulary (vendor it first). PATCHED to rewire three upstream-only
  deps to harness equivalents (see local_patches). Its HTML report uses Tailwind +
  Mermaid via CDN and is written to a temp dir, never into the repo.
