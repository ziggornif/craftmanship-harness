# Craft harness project configuration
# Generated by `project-setup` skill — edit by hand or re-run project-setup to update.
# Skills read this file to find docs, tracker, and glossary — don't move it.

tracker:
  kind: null            # github | gitlab | local — set by project-setup
  cli: null             # gh | glab | null
  project: null         # e.g. group/repo for GitLab, owner/repo for GitHub
  authenticated: false  # updated by project-setup after auth check

docs:
  glossary: docs/glossary.md
  adr_dir: docs/adr
  specs_dir: docs/specs
  product_brief: docs/product/brief.md
  architecture: docs/architecture.md
  design: docs/design.md
  tech_debt: docs/tech-debt.md
  threat_model: docs/security/threat-model.md
  accepted_risks: docs/security/accepted-risks.md

labels:
  # Canonical harness role → actual tracker label string (edit to match your tracker's labels)
  ready-for-agent: ready-for-agent
  needs-info: needs-info
  bug: bug
  enhancement: enhancement
